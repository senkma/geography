# Lokální vývoj — jeden kontejner, Vite HMR, http://localhost:8090
# Spuštění: docker compose up --build
services:
  geostudium:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: geostudium-dev:latest
    container_name: geostudium
    working_dir: /app
    volumes:
      - .:/app
      - dev_node_modules:/app/node_modules
    ports:
      - "8090:8090"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  dev_node_modules:
